services:
  postgres:
    image: postgres:16-alpine
    container_name: legally-postgres
    environment:
      POSTGRES_DB: legally
      POSTGRES_USER: legally
      POSTGRES_PASSWORD: legally
    ports:
      - "5432:5432"
    volumes:
      - legally_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legally -d legally"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  legally_pg_data:
