services:
  - type: web
    name: legally-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_MODE
        value: cloud-sql
      - key: SPRING_PROFILES_ACTIVE
        value: cloudsql
      - key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
        sync: false
      - key: CLOUD_SQL_DATABASE_NAME
        value: legally-7f34d-database
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: FIREBASE_ENABLED
        value: "true"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase.json
      - key: FIREBASE_REQUIRE_AUTH
        value: "true"
      - key: FIREBASE_ANONYMOUS_ONLY
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SERVER_PORT
        value: "8080"
