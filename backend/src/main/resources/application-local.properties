# IntelliJ / local dev — Postgres on localhost:5432 (NO Docker required)
# Active profile: local
#
# Use either:
#   A) PostgreSQL installed on Windows (see docs/NO_DOCKER_SETUP.md), or
#   B) Docker: docker compose up -d postgres

legally.database.mode=local

spring.datasource.url=jdbc:postgresql://localhost:5432/legally
spring.datasource.username=postgres
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



legally.gemini.api-key=${GEMINI_API_KEY:}
legally.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
