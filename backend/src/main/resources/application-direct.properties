# No Docker: connect via Cloud SQL Auth Proxy on 127.0.0.1 OR Cloud SQL public IP
#
# 1) Install proxy: https://cloud.google.com/sql/docs/postgres/sql-proxy
# 2) Run: cloud-sql-proxy legally-7f34d:us-east4:legally-7f34d-instance --port 5432
# 3) IntelliJ Active profiles: direct
# 4) Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD in env

legally.database.mode=direct

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
