# Load backend/.env when present (KEY=value format). optional: = no error if missing.
#spring.config.import=optional:file:.env[.properties]
spring.config.import=optional:file:backend/.env[.properties]

# Cloud Run injects PORT; local dev uses SERVER_PORT
server.port=${PORT:${SERVER_PORT:8080}}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- PostgreSQL (Option A: Spring Boot JDBC, not SQL Connect GraphQL SDK) ---
# Modes (legally.database.mode):
#   local     = Docker Postgres (default)
#   cloud-sql = Cloud SQL socket factory (deploy on GCP / same project as Firebase SQL Connect)
#   direct    = use DATABASE_URL (Cloud SQL public IP or Auth Proxy on localhost)
legally.database.mode=${DATABASE_MODE}
legally.database.name=${CLOUD_SQL_DATABASE_NAME}
legally.database.cloud-sql-instance-connection-name=${CLOUD_SQL_INSTANCE_CONNECTION_NAME}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Avoid dialect error when JDBC metadata is unavailable at bootstrap
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

legally.gemini.api-key=${GEMINI_API_KEY}

legally.serp-api.enabled=${SERPAPI_ENABLED:true}
legally.serp-api.api-key=${SERPAPI_API_KEY:}
legally.serp-api.max-results=${SERPAPI_MAX_RESULTS:8}
legally.serp-api.max-pages-to-fetch=${SERPAPI_MAX_PAGES:3}
legally.serp-api.max-excerpt-chars=${SERPAPI_MAX_EXCERPT_CHARS:6000}

legally.firebase.enabled=${FIREBASE_ENABLED}
legally.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH}
legally.firebase.project-id=${FIREBASE_PROJECT_ID}
legally.firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET}
legally.firebase.require-auth=${FIREBASE_REQUIRE_AUTH}
legally.firebase.anonymous-only=${FIREBASE_ANONYMOUS_ONLY}

legally.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
legally.upload.local-dir=${UPLOAD_LOCAL_DIR:uploads}

# User session TTL and hourly cleanup of uploads + consultation history
legally.session.ttl-hours=${SESSION_TTL_HOURS:72}
legally.session.cleanup-cron=${SESSION_CLEANUP_CRON:0 0 * * * *}

management.endpoints.web.exposure.include=health,info
