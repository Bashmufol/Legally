# Load .env from common locations (paths are relative to the JVM working directory).
# IntelliJ: set working directory to project root (Legally/) OR keep .env next to that directory.
# If you run from backend/, use backend/.env via the second path below.
spring.config.import=\
optional:file:.env[.properties],\
optional:file:backend/.env[.properties],\
optional:file:../.env[.properties]

# Cloud Run injects PORT; local dev uses SERVER_PORT
server.port=${PORT:${SERVER_PORT:8080}}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- PostgreSQL (Option A: Spring Boot JDBC, not SQL Connect GraphQL SDK) ---
# Modes (legally.database.mode):
#   local     = Docker Postgres (default)
#   cloud-sql = Cloud SQL socket factory (deploy on GCP / same project as Firebase SQL Connect)
#   direct    = use DATABASE_URL (Cloud SQL public IP or Auth Proxy on localhost)
legally.database.mode=${DATABASE_MODE}
legally.database.name=${CLOUD_SQL_DATABASE_NAME}
legally.database.cloud-sql-instance-connection-name=${CLOUD_SQL_INSTANCE_CONNECTION_NAME}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Avoid dialect error when JDBC metadata is unavailable at bootstrap
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

legally.gemini.api-key=${GEMINI_API_KEY}

legally.llm.provider-order=${LLM_PROVIDER_ORDER}
legally.llm.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
legally.llm.groq.api-key=${GROQ_API_KEY}
legally.llm.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
legally.llm.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
legally.llm.openrouter.api-key=${OPENROUTER_API_KEY}
legally.llm.openrouter.model=${OPENROUTER_MODEL:meta-llama/llama-3.3-70b-instruct:free}
legally.llm.mistral.base-url=${MISTRAL_BASE_URL:https://api.mistral.ai/v1}
legally.llm.mistral.api-key=${MISTRAL_API_KEY}
legally.llm.mistral.model=${MISTRAL_MODEL:mistral-small-latest}
legally.llm.cloudflare.account-id=${CLOUDFLARE_ACCOUNT_ID}
legally.llm.cloudflare.api-key=${CLOUDFLARE_API_KEY}
legally.llm.cloudflare.model=${CLOUDFLARE_MODEL:@cf/meta/llama-3.1-8b-instruct}
legally.llm.huggingface.base-url=${HUGGINGFACE_BASE_URL:https://router.huggingface.co/v1}
legally.llm.huggingface.api-key=${HUGGINGFACE_API_KEY}
legally.llm.huggingface.model=${HUGGINGFACE_MODEL:meta-llama/Meta-Llama-3-8B-Instruct}

legally.firebase.enabled=${FIREBASE_ENABLED}
legally.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH}
legally.firebase.project-id=${FIREBASE_PROJECT_ID}
legally.firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET}
legally.firebase.require-auth=${FIREBASE_REQUIRE_AUTH}
legally.firebase.anonymous-only=${FIREBASE_ANONYMOUS_ONLY}

legally.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
legally.upload.local-dir=${UPLOAD_LOCAL_DIR:uploads}

# User session TTL and hourly cleanup of uploads + consultation history
legally.session.ttl-hours=${SESSION_TTL_HOURS:72}
legally.session.cleanup-cron=${SESSION_CLEANUP_CRON:0 0 * * * *}

management.endpoints.web.exposure.include=health,info
