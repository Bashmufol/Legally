server.port=${SERVER_PORT:8080}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# --- PostgreSQL (Option A: Spring Boot JDBC, not SQL Connect GraphQL SDK) ---
# Modes (legally.database.mode):
#   local     = Docker Postgres (default)
#   cloud-sql = Cloud SQL socket factory (deploy on GCP / same project as Firebase SQL Connect)
#   direct    = use DATABASE_URL (Cloud SQL public IP or Auth Proxy on localhost)
legally.database.mode=${DATABASE_MODE:local}
legally.database.name=${CLOUD_SQL_DATABASE_NAME:legally}
legally.database.cloud-sql-instance-connection-name=${CLOUD_SQL_INSTANCE_CONNECTION_NAME:}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/legally}
spring.datasource.username=${DATABASE_USERNAME:legally}
spring.datasource.password=${DATABASE_PASSWORD:legally}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

legally.gemini.api-key=${GEMINI_API_KEY:}
legally.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

legally.firebase.enabled=${FIREBASE_ENABLED:false}
legally.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
legally.firebase.project-id=${FIREBASE_PROJECT_ID:}
legally.firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET:}
legally.firebase.require-auth=${FIREBASE_REQUIRE_AUTH:false}
legally.firebase.anonymous-only=${FIREBASE_ANONYMOUS_ONLY:true}

legally.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
legally.upload.local-dir=${UPLOAD_LOCAL_DIR:uploads}

management.endpoints.web.exposure.include=health,info
