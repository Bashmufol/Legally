# Profile: Cloud SQL (Firebase SQL Connect) — use on Cloud Run or with working GCP credentials locally
# IntelliJ: only use if gcloud ADC works AND instance is running; otherwise use profile "local"
#
# Run: SPRING_PROFILES_ACTIVE=cloudsql

legally.database.mode=cloud-sql

legally.database.cloud-sql-instance-connection-name=${CLOUD_SQL_INSTANCE_CONNECTION_NAME}
legally.database.name=${CLOUD_SQL_DATABASE_NAME}

spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Custom CloudSqlDataSourceConfig provides @Primary DataSource — disable auto-config placeholder URL
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Re-bind after profile .env import (in case main application.properties loaded before .env existed)
legally.gemini.api-key=${GEMINI_API_KEY}