# Profile: connect to Firebase SQL Connect's Cloud SQL instance (Option A production)
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=cloudsql
# Or: SPRING_PROFILES_ACTIVE=cloudsql

legally.database.mode=cloud-sql

# From Firebase / Cloud Console → SQL → Instance → Connection name
# Example: legally-7f34d:us-east4:legally-7f34d-instance
legally.database.cloud-sql-instance-connection-name=${CLOUD_SQL_INSTANCE_CONNECTION_NAME}
legally.database.name=${CLOUD_SQL_DATABASE_NAME:legally-7f34d-database}

spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# URL built by CloudSqlDataSourceConfig (socket factory); not used when mode=cloud-sql
spring.datasource.url=jdbc:postgresql://localhost/disabled
